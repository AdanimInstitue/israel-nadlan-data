name: ci

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      COVERAGE_FILE: .coverage
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run release validation
        run: python scripts/validate_release.py --check

      - name: Run tests with coverage
        run: python -m coverage run -m pytest

      - name: Render coverage reports
        if: always()
        run: |
          python -m coverage report | tee coverage-report.txt
          python -m coverage xml

      - name: Upload raw coverage data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-agent-context-coverage-py312
          path: .coverage
          include-hidden-files: true
          if-no-files-found: error

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: |
            coverage.xml
            coverage-report.txt
          if-no-files-found: error

  pr-agent-context:
    name: pr-agent-context
    if: ${{ always() }}
    needs: [validate]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4
    with:
      tool_ref: v4
      publish_mode: append
      target_patch_coverage: "100"
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: coverage-xml
      coverage_report_filename: coverage.xml
      prompt_template_file: .github/pr-agent-context-template.md
      debug_artifacts: true
